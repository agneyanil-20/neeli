<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEELI - Folklore Explorer</title>
    <!-- Syne Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #ffffff;
            --glow-color: rgba(255, 255, 255, 0.4);
            --text-primary: rgba(255, 255, 255, 0.9);
            --text-secondary: rgba(255, 255, 255, 0.5);
            --glass-bg: rgba(15, 15, 15, 0.4);
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Syne', sans-serif;
            color: var(--text-primary);
        }

        #map {
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            /* Cinematic but readable map */
            filter: brightness(0.9) contrast(1.1) saturate(0.8);
            transition: filter 2s ease;
        }

        /* Hide Leaflet Controls */
        .leaflet-control-zoom,
        .leaflet-control-attribution {
            display: none !important;
        }

        /* ATMOSPHERIC EFFECTS */
        #fog-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            background: url('https://raw.githubusercontent.com/danielstuart14/CSS_FOG_ANIMATION/master/fog1.png') repeat-x;
            background-size: 100% 100%;
            opacity: 0.1; /* Subtler fog */
            z-index: 2;
            pointer-events: none;
            animation: fogAnim 120s linear infinite; /* Slower, cinematic */
        }

        @keyframes fogAnim {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-50%, -10%); }
        }

        #particles-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            opacity: 0;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 0.3; }
            80% { opacity: 0.3; }
            100% { transform: translateY(-80px) scale(0); opacity: 0; }
        }

        /* LIQUID GLASS SYSTEM (Refined & Serious) */
        .liquid-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(120%);
            -webkit-backdrop-filter: blur(20px) saturate(120%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            border-radius: 20px;
        }

        /* TOP BAR */
        #top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(56px + env(safe-area-inset-top));
            padding: env(safe-area-inset-top) 20px 0 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 0;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            z-index: 1000;
        }

        .top-title {
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 0.6em;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        /* STATUS BANNER */
        #status-banner {
            position: fixed;
            top: calc(56px + env(safe-area-inset-top) + 12px);
            left: 16px;
            right: 16px;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            z-index: 1000;
            text-align: center;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: all 1s ease;
        }

        .status-day {
            color: rgba(255, 255, 255, 0.6);
        }
        .status-evening {
            color: #85c1e9;
            box-shadow: 0 0 20px rgba(41, 128, 185, 0.1);
        }
        .status-midnight {
            color: #e74c3c;
            box-shadow: 0 0 20px rgba(192, 57, 43, 0.15);
        }
        .status-late {
            color: #f39c12;
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.1);
        }

        /* FILTER ROW */
        #filter-row {
            position: fixed;
            top: calc(56px + env(safe-area-inset-top) + 68px);
            left: 0;
            width: 100%;
            padding: 0 16px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            z-index: 1000;
        }

        #filter-row::-webkit-scrollbar {
            display: none;
        }

        .chip {
            height: 32px;
            padding: 0 16px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            letter-spacing: 0.05em;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s ease;
            background: rgba(20, 20, 20, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
        }

        .chip.active {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.05);
        }

        /* BOTTOM BAR */
        #bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: calc(56px + env(safe-area-inset-bottom));
            padding: 0 24px env(safe-area-inset-bottom) 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 0;
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            z-index: 1000;
        }

        .bottom-stat {
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .bottom-stat span {
            color: var(--text-primary);
        }

        /* BOTTOM SHEET (Cinematic Lore Reader) */
        #bottom-sheet {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            height: 75vh;
            background: rgba(8, 8, 8, 0.85);
            backdrop-filter: blur(50px) saturate(100%);
            -webkit-backdrop-filter: blur(50px) saturate(100%);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px 28px 0 0;
            padding: 32px 24px calc(32px + env(safe-area-inset-bottom));
            z-index: 2000;
            transition: bottom 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 0 -20px 60px rgba(0,0,0,0.9);
            overflow-y: auto;
        }

        #bottom-sheet.active {
            bottom: 0;
        }
        
        #close-sheet-btn {
            position: absolute;
            top: 24px;
            right: 24px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        
        #close-sheet-btn:active {
            background: rgba(255,255,255,0.2);
        }

        #sheet-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
            padding-right: 40px;
        }

        #sheet-emoji {
            font-size: 42px;
            opacity: 0.8;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.1));
        }

        #sheet-name {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.02em;
            margin-bottom: 4px;
        }

        #sheet-type-tag {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 700;
            color: var(--text-secondary);
        }

        .sheet-meta {
            display: flex;
            gap: 24px;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .meta-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-secondary);
            font-weight: 700;
        }

        .meta-value {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .sheet-section {
            margin-bottom: 32px;
        }

        .section-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-secondary);
            font-weight: 800;
            margin-bottom: 12px;
        }

        .section-text {
            font-size: 15px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 400;
        }

        /* GHOST MARKERS (Cinematic/Serious) */
        .ghost-container {
            background: transparent;
            border: none;
        }
        
        .ghost-marker {
            width: 100%;
            height: 100%;
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px; /* For the skull emoji */
            color: rgba(255, 255, 255, 0.8);
            animation: floatMarker 4s ease-in-out infinite;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.03);
            transition: opacity 0.5s ease;
        }

        .ghost-container.daytime .ghost-marker {
            opacity: 0.3;
        }

        @keyframes floatMarker {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* GRAVEYARD MARKERS (Minimal) */
        .graveyard-marker-container {
            background: transparent;
            border: none;
        }
        
        .graveyard-marker {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        /* DANGER ZONES SVG STYLES */
        .danger-zone-path {
            animation: zonePulse 8s ease-in-out infinite;
        }

        @keyframes zonePulse {
            0%, 100% { opacity: 0.08; transform: scale(1); }
            50% { opacity: 0.12; transform: scale(1.02); }
        }

        /* Pulsing user location marker */
        .user-location-marker {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dot-core {
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            z-index: 2;
        }

        .dot-pulse {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: pulse 3s cubic-bezier(0.2, 0.8, 0.2, 1) infinite;
            z-index: 1;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(4); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="fog-overlay"></div>
    <div id="particles-container"></div>

    <div id="top-bar" class="liquid-glass">
        <div class="top-title">NEELI</div>
    </div>

    <div id="status-banner" class="liquid-glass"></div>

    <div id="filter-row">
        <div class="chip active" data-filter="All Spirits">All Records</div>
        <div class="chip" data-filter="Neeli">Neeli</div>
        <div class="chip" data-filter="Yakshi">Yakshi</div>
        <div class="chip" data-filter="Odiyan">Odiyan</div>
        <div class="chip" data-filter="Chathan">Chathan</div>
        <div class="chip" data-filter="Ritual">Ritual</div>
        <div class="chip" data-filter="Forest">Forest</div>
    </div>

    <div id="bottom-bar" class="liquid-glass">
        <div class="bottom-stat"><span id="ghost-count">0</span> readings detected nearby</div>
    </div>

    <div id="bottom-sheet">
        <button id="close-sheet-btn">✕</button>
        <div id="sheet-header">
            <div id="sheet-emoji">☠️</div>
            <div class="sheet-header-text">
                <div id="sheet-name">Name</div>
                <div id="sheet-type-tag">Type</div>
            </div>
        </div>
        
        <div class="sheet-meta">
            <div class="meta-item">
                <span class="meta-label">Activity Level</span>
                <span id="sheet-activity" class="meta-value">High</span>
            </div>
            <div class="meta-item">
                <span class="meta-label">Primary Haunt</span>
                <span id="sheet-location" class="meta-value">Forests</span>
            </div>
        </div>
    
        <div class="sheet-section">
            <div class="section-title">Folklore Background</div>
            <div id="sheet-backstory" class="section-text">...</div>
        </div>
    
        <div class="sheet-section">
            <div class="section-title">Known Origin</div>
            <div id="sheet-origin" class="section-text">...</div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Setup Particles
            const particlesContainer = document.getElementById('particles-container');
            for(let i=0; i<20; i++) {
                let p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = Math.random() * 100 + 'vh';
                p.style.animationDuration = (Math.random() * 8 + 8) + 's';
                p.style.animationDelay = (Math.random() * 5) + 's';
                particlesContainer.appendChild(p);
            }

            // Setup Map
            const map = L.map('map', {
                zoomControl: false,
                attributionControl: false,
                zoomSnap: 0.5
            }).setView([0, 0], 16.5);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 20
            }).addTo(map);

            let userMarker;
            const pulsingIcon = L.divIcon({
                className: 'user-location-marker',
                html: '<div class="dot-pulse"></div><div class="dot-core"></div>',
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });

            // Serious Folklore Data
            const ghostsList = [
                { 
                    name: 'Pretham', type: 'Ritual', rarity: 'common', activity: 'Low', location: 'Abandoned Houses',
                    backstory: 'A generic term for restless spirits in Kerala folklore, often associated with unfinished earthly desires or unnatural passing. They linger aimlessly near the places they died, unable to move on.',
                    origin: 'Souls unable to cross over due to the lack of proper funerary rites or sudden, tragic death.'
                },
                { 
                    name: 'Pishachu', type: 'Ritual', rarity: 'common', activity: 'Moderate', location: 'Desolate Areas',
                    backstory: 'Malevolent entities known to haunt desolate areas, feeding on negative energy and fear. In lore, they are described as having grotesque forms and a deep hatred for the living.',
                    origin: 'Born from intense malice, unresolved wrath, or extreme greed during their mortal life.'
                },
                { 
                    name: 'Marutha', type: 'Forest', rarity: 'common', activity: 'Low', location: 'Deep Woods',
                    backstory: 'Sorrowful spirits of women who died during pregnancy or childbirth. They are often heard weeping softly in remote forest paths at night.',
                    origin: 'Tragic maternal death leading to eternal wandering, forever searching for their lost children.'
                },
                { 
                    name: 'Maadan', type: 'Forest', rarity: 'common', activity: 'Moderate', location: 'Sacred Groves',
                    backstory: 'Powerful regional protectors or punishers residing in sacred groves (Kavu). They guard the forest borders and severely punish trespassers or those who disrespect nature.',
                    origin: 'Deified ancestors or powerful martial artists elevated to spirit status by ancient forest tribes.'
                },
                { 
                    name: 'Parakutty', type: 'Chathan', rarity: 'uncommon', activity: 'High', location: 'Old Manors',
                    backstory: 'Mischievous child spirits bound by sorcerers to do their bidding. They cause poltergeist-like disturbances, moving objects and throwing stones to terrorize households.',
                    origin: 'Summoned via dark rituals to serve earthly masters, trapped in a child-like ethereal form.'
                },
                { 
                    name: 'Neeli', type: 'Neeli', rarity: 'uncommon', activity: 'High', location: 'Crossroads',
                    backstory: 'Vengeful female spirits, often appearing as beautiful women to lure unsuspecting travelers. They haunt specific bloodlines or regions to enact revenge.',
                    origin: 'Created through severe betrayal and murder, returning to the mortal plane demanding karmic retribution.'
                },
                { 
                    name: 'Karinkali', type: 'Ritual', rarity: 'rare', activity: 'High', location: 'Ritual Grounds',
                    backstory: 'Fierce, dark manifestations associated with destructive energy. Encounters with Karinkali bring immense dread, a sudden drop in temperature, and a feeling of heavy oppression.',
                    origin: 'Invoked during forbidden nocturnal ceremonies and left unbound to roam.'
                },
                { 
                    name: 'Gulikan', type: 'Ritual', rarity: 'rare', activity: 'Extreme', location: 'Village Borders',
                    backstory: 'A fierce entity in the Theyyam tradition, representing the inevitable god of death. Sighting Gulikan is considered an absolute omen of impending mortality.',
                    origin: 'Mythology states he was born from the left toe of Lord Shiva during a period of intense cosmic wrath.'
                },
                { 
                    name: 'Kutti Chathan', type: 'Chathan', rarity: 'epic', activity: 'Extreme', location: 'Ancestral Homes',
                    backstory: 'A powerful entity in Malabar folklore, capable of both immense help and extreme destruction depending entirely on how it is treated by its master or the household.',
                    origin: 'Bound by powerful Mantrikans using ancient esoteric texts, requiring strict daily offerings to remain peaceful.'
                },
                { 
                    name: 'Chudala', type: 'Ritual', rarity: 'epic', activity: 'Moderate', location: 'Cremation Grounds',
                    backstory: 'Dark entities dwelling exclusively in cremation grounds, feeding on the ashes and remnants of the dead. They rarely leave their domain but are highly aggressive if disturbed.',
                    origin: 'Drawn to the psychic residue, sorrow, and sudden release of energy concentrated around burning pyres.'
                },
                { 
                    name: 'Yakshi', type: 'Yakshi', rarity: 'legendary', activity: 'High', location: 'Pala Trees',
                    backstory: 'A famous wandering spirit from Kerala folklore. She haunts isolated roads and forests, using the hypnotic scent of Pala flowers to mesmerize and consume victims.',
                    origin: 'A woman subjected to gruesome betrayal and tragic death, binding her vengeful soul to the earth.'
                },
                { 
                    name: 'Odiyan', type: 'Odiyan', rarity: 'legendary', activity: 'Extreme', location: 'Rural Palakkad',
                    backstory: 'A feared shapeshifter associated with ancient ritual practices. They appear as shadowy animals in the night to terrorize or assassinate targeted individuals.',
                    origin: 'Mortal men who mastered the dark art of Odividya, sacrificing their humanity to assume supernatural animal forms.'
                },
                { 
                    name: 'Kalliyankattu Neeli', type: 'Neeli', rarity: 'legendary', activity: 'Extreme', location: 'Kalliyankadu',
                    backstory: 'The most famous and feared Neeli in Kerala history. Her haunting of the Kalliyankattu region was so terrifying it required the intervention of legendary priests to finally bind her.',
                    origin: 'A devoted wife brutally murdered by her husband for her wealth, returning with unmatched fury and power.'
                },
                { 
                    name: 'Madan Thampuran', type: 'Forest', rarity: 'mythic', activity: 'Moderate', location: 'Ancient Kavus',
                    backstory: 'A supreme lord of the sacred groves, commanding absolute respect and fear from both mortals and lesser spirits. His presence silences the entire forest.',
                    origin: 'An ancient, primordial guardian of the deep woods, worshiped since prehistoric times.'
                },
                { 
                    name: 'Brahmarakshas', type: 'Ritual', rarity: 'mythic', activity: 'Extreme', location: 'Ruined Temples',
                    backstory: 'The ferocious spirit of a highly learned scholar. They possess immense magical knowledge and are nearly impossible to exorcise due to their intelligence.',
                    origin: 'Immense spiritual knowledge corrupted by a sudden, unnatural death or a grave sin committed just before passing.'
                }
            ];

            const spawnWeights = {
                'common': 40, 'uncommon': 25, 'rare': 18, 'epic': 10, 'legendary': 5, 'mythic': 2
            };

            // Global State
            let currentLatLng = null;
            let activeFilter = 'All Spirits';
            const spawnedGhosts = []; 
            let graveyards = [];

            // Dynamic Time Logic
            const hour = new Date().getHours();
            let isNight = false;
            let maxGhosts = 3;
            let spawnIntervalMs = 90000;
            const statusBanner = document.getElementById('status-banner');

            if (hour >= 6 && hour < 18) {
                // Day
                statusBanner.innerText = "Daylight: Paranormal signals faint";
                statusBanner.className = "status-day liquid-glass";
            } else if (hour >= 18 && hour < 24) {
                // Evening
                isNight = true; maxGhosts = 6; spawnIntervalMs = 30000;
                statusBanner.innerText = "Twilight: Monitoring active frequencies";
                statusBanner.className = "status-evening liquid-glass";
            } else if (hour >= 0 && hour < 3) {
                // Midnight
                isNight = true; maxGhosts = 8; spawnIntervalMs = 20000;
                statusBanner.innerText = "Midnight: High paranormal distortion";
                statusBanner.className = "status-midnight liquid-glass";
            } else {
                // Late Night (3 AM - 6 AM)
                isNight = true; maxGhosts = 6; spawnIntervalMs = 25000;
                statusBanner.innerText = "Witching Hour: Severe anomalies detected";
                statusBanner.className = "status-late liquid-glass";
            }

            // DOM Elements
            const ghostCountDisplay = document.getElementById('ghost-count');
            
            const bottomSheet = document.getElementById('bottom-sheet');
            const closeSheetBtn = document.getElementById('close-sheet-btn');
            const sheetName = document.getElementById('sheet-name');
            const sheetTypeTag = document.getElementById('sheet-type-tag');
            const sheetActivity = document.getElementById('sheet-activity');
            const sheetLocation = document.getElementById('sheet-location');
            const sheetBackstory = document.getElementById('sheet-backstory');
            const sheetOrigin = document.getElementById('sheet-origin');
            
            // Filter Logic
            const chips = document.querySelectorAll('.chip');
            chips.forEach(chip => {
                chip.addEventListener('click', (e) => {
                    chips.forEach(c => c.classList.remove('active'));
                    e.target.classList.add('active');
                    activeFilter = e.target.dataset.filter;
                    updateGhostVisibility();
                });
            });

            function updateGhostVisibility() {
                let visibleCount = 0;
                spawnedGhosts.forEach(g => {
                    const shouldShow = activeFilter === 'All Spirits' || g.data.type === activeFilter;
                    if (shouldShow) {
                        if (!map.hasLayer(g.marker)) map.addLayer(g.marker);
                        visibleCount++;
                    } else {
                        if (map.hasLayer(g.marker)) map.removeLayer(g.marker);
                    }
                });
                ghostCountDisplay.innerText = visibleCount;
            }

            // UI Interactions
            closeSheetBtn.addEventListener('click', () => {
                bottomSheet.classList.remove('active');
            });

            map.on('click', () => bottomSheet.classList.remove('active'));

            // Spawning Logic
            function getRandomGhost() {
                const rand = Math.random() * 100;
                let cumulativeWeight = 0;
                let selectedRarity = 'common';
                for (const [rarity, weight] of Object.entries(spawnWeights)) {
                    cumulativeWeight += weight;
                    if (rand <= cumulativeWeight) {
                        selectedRarity = rarity;
                        break;
                    }
                }
                const filtered = ghostsList.filter(g => g.rarity === selectedRarity);
                return filtered[Math.floor(Math.random() * filtered.length)];
            }

            function getRandomLatLngAnnulus(center, minRadius, maxRadius) {
                const R = 6378137;
                const r = Math.sqrt(Math.random() * (Math.pow(maxRadius, 2) - Math.pow(minRadius, 2)) + Math.pow(minRadius, 2));
                const theta = Math.random() * 2 * Math.PI;
                const dLat = r * Math.cos(theta);
                const dLng = r * Math.sin(theta);
                const latOffset = dLat / R * (180 / Math.PI);
                const lngOffset = dLng / (R * Math.cos(Math.PI * center.lat / 180)) * (180 / Math.PI);
                return L.latLng(center.lat + latOffset, center.lng + lngOffset);
            }

            function spawnSingleGhost(centerLatLng) {
                if (spawnedGhosts.length >= maxGhosts) return;

                const ghost = getRandomGhost();
                let location = getRandomLatLngAnnulus(centerLatLng, 100, 600);
                
                // Graveyard Biasing for specific lore types
                if (isNight && (ghost.type === 'Ritual' || ghost.type === 'Yakshi') && graveyards.length > 0) {
                    if (Math.random() > 0.4) {
                        const grave = graveyards[Math.floor(Math.random() * graveyards.length)];
                        location = getRandomLatLngAnnulus(L.latLng(grave.lat, grave.lon), 0, 40);
                    }
                }
                
                const daytimeClass = isNight ? '' : 'daytime';
                
                // Outer container is static for Leaflet accuracy, inner div has CSS animation
                const ghostIcon = L.divIcon({
                    className: `ghost-container ${daytimeClass}`,
                    html: `<div class="ghost-marker">☠️</div>`,
                    iconSize: [36, 36],
                    iconAnchor: [18, 18]
                });

                const marker = L.marker(location, { icon: ghostIcon });
                spawnedGhosts.push({ marker: marker, data: ghost });
                updateGhostVisibility();

                marker.on('click', (e) => {
                    L.DomEvent.stopPropagation(e);
                    
                    sheetName.innerText = ghost.name;
                    sheetTypeTag.innerText = `${ghost.type} Entity • ${ghost.rarity}`;
                    sheetActivity.innerText = ghost.activity;
                    sheetLocation.innerText = ghost.location;
                    sheetBackstory.innerText = ghost.backstory;
                    sheetOrigin.innerText = ghost.origin;
                    
                    bottomSheet.classList.add('active');
                });
            }

            // Atmosphere Systems
            function generateDangerZones(center) {
                const zoneTypes = [
                    { color: '#888888', type: 'grey' }, 
                    { color: '#555555', type: 'dark' }
                ];
                
                const numZones = Math.floor(Math.random() * 3) + 2;
                for(let i=0; i<numZones; i++) {
                    const zoneDef = zoneTypes[Math.floor(Math.random() * zoneTypes.length)];
                    const loc = getRandomLatLngAnnulus(center, 200, 1000);
                    const radius = Math.random() * 300 + 150; 
                    
                    L.circle(loc, {
                        color: 'transparent',
                        fillColor: zoneDef.color,
                        fillOpacity: 0.08,
                        radius: radius,
                        className: 'danger-zone-path',
                        interactive: false
                    }).addTo(map);
                }
            }

            function fetchGraveyards(lat, lon) {
                const query = `
                    [out:json];
                    nwr["landuse"="cemetery"](around:2500,${lat},${lon});
                    out center;
                `;
                fetch('https://overpass-api.de/api/interpreter', {
                    method: 'POST',
                    body: query
                })
                .then(response => response.json())
                .then(data => {
                    graveyards = data.elements.map(el => {
                        return {
                            lat: el.lat || el.center.lat,
                            lon: el.lon || el.center.lon
                        }
                    }).filter(g => g.lat && g.lon);
                    
                    const graveIcon = L.divIcon({
                        className: 'graveyard-marker-container',
                        html: '<div class="graveyard-marker">✝</div>',
                        iconSize: [24, 24],
                        iconAnchor: [12, 12]
                    });
                    
                    graveyards.forEach(g => {
                        L.marker([g.lat, g.lon], { icon: graveIcon, interactive: false }).addTo(map);
                    });
                })
                .catch(err => console.log('OSM Graveyard fetch failed silently.', err));
            }

            let mapInitialized = false;

            function initGameplay(centerLatLng) {
                if (mapInitialized) return;
                mapInitialized = true;
                
                generateDangerZones(centerLatLng);
                fetchGraveyards(centerLatLng.lat, centerLatLng.lng);

                for (let i = 0; i < maxGhosts; i++) {
                    spawnSingleGhost(centerLatLng);
                }

                setInterval(() => {
                    if (currentLatLng) spawnSingleGhost(currentLatLng);
                }, spawnIntervalMs);
            }

            // Geolocation
            function onLocationFound(e) {
                currentLatLng = e.latlng;
                if (!userMarker) {
                    userMarker = L.marker(e.latlng, { icon: pulsingIcon }).addTo(map);
                } else {
                    userMarker.setLatLng(e.latlng);
                }
                map.setView(e.latlng, 16.5);
                initGameplay(e.latlng);
            }

            function onLocationError(e) {
                console.error("Location access error:", e.message);
                const fallback = L.latLng(8.5241, 76.9366); // Trivandrum
                map.setView(fallback, 16.5);
                initGameplay(fallback);
            }

            map.on('locationfound', onLocationFound);
            map.on('locationerror', onLocationError);
            map.locate({ setView: true, maxZoom: 16.5, watch: true, enableHighAccuracy: true });
        });
    </script>
</body>
</html>
