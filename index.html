<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HAUNT</title>
    <!-- Syne Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        :root {
            --bg-color: #030303;
            --accent-color: #ffffff;
            --glow-color: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Syne', sans-serif;
            color: #fff;
        }

        #map {
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            /* Make map slightly darker to fit the aesthetic */
            filter: brightness(0.85) contrast(1.2) saturate(0.8);
            transition: filter 2s ease;
        }
        
        #map.midnight {
            filter: brightness(0.6) contrast(1.3) saturate(0.7);
        }

        /* Hide Leaflet Controls */
        .leaflet-control-zoom,
        .leaflet-control-attribution {
            display: none !important;
        }

        /* ATMOSPHERIC EFFECTS */
        #fog-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            background: url('https://raw.githubusercontent.com/danielstuart14/CSS_FOG_ANIMATION/master/fog1.png') repeat-x;
            background-size: 100% 100%;
            opacity: 0.15;
            z-index: 2;
            pointer-events: none;
            animation: fogAnim 60s linear infinite;
        }

        @keyframes fogAnim {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-50%, -10%); }
        }

        #particles-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            opacity: 0;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { transform: translateY(-100px) scale(0); opacity: 0; }
        }

        /* LIQUID GLASS SYSTEM */
        .liquid-glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            border-radius: 20px;
        }

        /* TOP BAR */
        #top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(56px + env(safe-area-inset-top));
            padding: env(safe-area-inset-top) 20px 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 0;
            border-left: none;
            border-right: none;
            border-top: none;
            z-index: 1000;
        }

        .top-title {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.4em;
            text-transform: uppercase;
        }

        .top-score {
            font-size: 24px;
            font-weight: 800;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        /* STATUS BANNER */
        #status-banner {
            position: fixed;
            top: calc(56px + env(safe-area-inset-top) + 12px);
            left: 16px;
            right: 16px;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 700;
            z-index: 1000;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 0.05em;
            transition: all 0.5s ease;
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 1; transform: scale(1.01); }
        }

        .status-day {
            background: rgba(255, 255, 255, 0.1);
            color: #ddd;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
        }

        .status-evening {
            background: rgba(41, 128, 185, 0.2);
            color: #85c1e9;
            border: 1px solid rgba(41, 128, 185, 0.3);
            box-shadow: 0 0 25px rgba(41, 128, 185, 0.2);
        }

        .status-midnight {
            background: rgba(192, 57, 43, 0.2);
            color: #e74c3c;
            border: 1px solid rgba(192, 57, 43, 0.4);
            box-shadow: 0 0 30px rgba(192, 57, 43, 0.3);
            text-shadow: 0 0 10px rgba(231, 76, 60, 0.5);
        }

        .status-late {
            background: rgba(243, 156, 18, 0.15);
            color: #f39c12;
            border: 1px solid rgba(243, 156, 18, 0.3);
            box-shadow: 0 0 25px rgba(243, 156, 18, 0.2);
        }

        /* FILTER ROW */
        #filter-row {
            position: fixed;
            top: calc(56px + env(safe-area-inset-top) + 68px);
            left: 0;
            width: 100%;
            padding: 0 16px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            z-index: 1000;
        }

        #filter-row::-webkit-scrollbar {
            display: none;
        }

        .chip {
            height: 34px;
            padding: 0 18px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.05em;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .chip.active {
            background: #ffffff;
            color: #000000;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border: none;
            box-shadow: 0 6px 16px rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        /* BOTTOM BAR */
        #bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: calc(64px + env(safe-area-inset-bottom));
            padding: 0 24px env(safe-area-inset-bottom) 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 0;
            border-left: none;
            border-right: none;
            border-bottom: none;
            z-index: 1000;
        }

        .bottom-stat {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .bottom-stat span {
            color: #fff;
        }

        .last-caught-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .rarity-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: dotPulse 2s infinite;
        }

        @keyframes dotPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.6; }
        }

        /* BOTTOM SHEET */
        #bottom-sheet {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            background: rgba(5, 5, 5, 0.75);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px 32px 0 0;
            padding: 32px 24px calc(32px + env(safe-area-inset-bottom));
            z-index: 2000;
            transition: bottom 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 -15px 50px rgba(0,0,0,0.8);
        }

        #bottom-sheet.active {
            bottom: 0;
        }

        #sheet-emoji {
            font-size: 56px;
            margin-bottom: 12px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            animation: floatUpDown 3s ease-in-out infinite;
        }

        #sheet-name {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: 0.02em;
        }

        #sheet-rarity {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            font-weight: 800;
            margin-bottom: 16px;
        }

        #sheet-points {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 700;
            margin-bottom: 32px;
        }

        #catch-btn {
            width: 100%;
            height: 56px;
            background-color: #fff;
            color: #000;
            border: none;
            border-radius: 16px;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 16px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #catch-btn:active {
            transform: scale(0.96);
            background-color: #eee;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }

        /* GHOST MARKERS */
        .ghost-marker {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            animation: floatUpDown 3s ease-in-out infinite, pulseAura 4s ease-in-out infinite;
        }

        .ghost-marker.daytime {
            opacity: 0.4;
            filter: grayscale(0.5);
        }

        @keyframes floatUpDown {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        @keyframes pulseAura {
            0%, 100% { box-shadow: 0 0 10px var(--marker-glow); }
            50% { box-shadow: 0 0 25px var(--marker-glow); }
        }

        /* GRAVEYARD MARKERS */
        .graveyard-marker {
            width: 36px;
            height: 36px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #aaa;
            box-shadow: 0 0 20px rgba(100, 100, 100, 0.3);
            animation: floatUpDown 4s ease-in-out infinite reverse;
        }

        /* DANGER ZONES SVG STYLES */
        .danger-zone-path {
            animation: zonePulse 5s ease-in-out infinite;
        }

        @keyframes zonePulse {
            0%, 100% { opacity: 0.15; transform: scale(1); }
            50% { opacity: 0.25; transform: scale(1.05); }
        }

        /* RARITY COLORS & EFFECTS */
        .rarity-common { border: 1.5px solid rgba(150, 150, 150, 0.5); --marker-glow: rgba(150, 150, 150, 0.2); }
        .rarity-uncommon { border: 1.5px solid rgba(46, 204, 113, 0.6); --marker-glow: rgba(46, 204, 113, 0.3); }
        .rarity-rare { border: 1.5px solid rgba(52, 152, 219, 0.7); --marker-glow: rgba(52, 152, 219, 0.4); }
        .rarity-epic { border: 1.5px solid rgba(155, 89, 182, 0.8); --marker-glow: rgba(155, 89, 182, 0.5); }
        .rarity-legendary { 
            border: 2px solid rgba(243, 156, 18, 0.9); 
            --marker-glow: rgba(243, 156, 18, 0.6);
            width: 56px;
            height: 56px;
            margin-left: -4px;
            margin-top: -4px;
        }
        .rarity-mythic { 
            border: 2px solid rgba(231, 76, 60, 1); 
            --marker-glow: rgba(231, 76, 60, 0.8);
            animation: floatUpDown 2s ease-in-out infinite, pulseAura 1.5s infinite;
            width: 56px;
            height: 56px;
            margin-left: -4px;
            margin-top: -4px;
        }

        /* TEXT COLORS */
        .color-common { color: #aaa; }
        .color-uncommon { color: #2ecc71; }
        .color-rare { color: #3498db; }
        .color-epic { color: #9b59b6; }
        .color-legendary { color: #f39c12; text-shadow: 0 0 10px rgba(243,156,18,0.5); }
        .color-mythic { color: #e74c3c; text-shadow: 0 0 15px rgba(231,76,60,0.8); }

        .bg-common { background-color: #aaa; }
        .bg-uncommon { background-color: #2ecc71; }
        .bg-rare { background-color: #3498db; }
        .bg-epic { background-color: #9b59b6; }
        .bg-legendary { background-color: #f39c12; }
        .bg-mythic { background-color: #e74c3c; }

        /* Pulsing user location marker */
        .user-location-marker {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dot-core {
            width: 14px;
            height: 14px;
            background: var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--glow-color);
            z-index: 2;
        }

        .dot-pulse {
            position: absolute;
            width: 14px;
            height: 14px;
            background: var(--accent-color);
            border-radius: 50%;
            animation: pulse 2.5s cubic-bezier(0.19, 1, 0.22, 1) infinite;
            z-index: 1;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            100% { transform: scale(5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="fog-overlay"></div>
    <div id="particles-container"></div>

    <div id="top-bar" class="liquid-glass">
        <div class="top-title">HAUNT</div>
        <div class="top-score" id="score-display">0</div>
    </div>

    <div id="status-banner" class="liquid-glass"></div>

    <div id="filter-row">
        <div class="chip liquid-glass active" data-filter="All Spirits">All Spirits</div>
        <div class="chip liquid-glass" data-filter="Neeli">Neeli</div>
        <div class="chip liquid-glass" data-filter="Yakshi">Yakshi</div>
        <div class="chip liquid-glass" data-filter="Odiyan">Odiyan</div>
        <div class="chip liquid-glass" data-filter="Chathan">Chathan</div>
        <div class="chip liquid-glass" data-filter="Ritual">Ritual</div>
        <div class="chip liquid-glass" data-filter="Forest">Forest</div>
    </div>

    <div id="bottom-bar" class="liquid-glass">
        <div class="bottom-stat"><span id="ghost-count">0</span> ghosts nearby</div>
        <div class="bottom-stat last-caught-container">
            Last: <span id="last-caught">-</span>
            <div id="last-caught-dot" class="rarity-dot" style="display: none;"></div>
        </div>
    </div>

    <div id="bottom-sheet">
        <div id="sheet-emoji"></div>
        <div id="sheet-name"></div>
        <div id="sheet-rarity"></div>
        <div id="sheet-points"></div>
        <button id="catch-btn">CATCH</button>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Setup Particles
            const particlesContainer = document.getElementById('particles-container');
            for(let i=0; i<30; i++) {
                let p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = Math.random() * 100 + 'vh';
                p.style.animationDuration = (Math.random() * 5 + 5) + 's';
                p.style.animationDelay = (Math.random() * 5) + 's';
                particlesContainer.appendChild(p);
            }

            // Setup Map
            const map = L.map('map', {
                zoomControl: false,
                attributionControl: false,
                zoomSnap: 0.5
            }).setView([0, 0], 16.5);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 20
            }).addTo(map);

            let userMarker;
            const pulsingIcon = L.divIcon({
                className: 'user-location-marker',
                html: '<div class="dot-pulse"></div><div class="dot-core"></div>',
                iconSize: [28, 28],
                iconAnchor: [14, 14]
            });

            // Ghost Data with Categories
            const ghostsList = [
                { name: 'Pretham', type: 'Ritual', rarity: 'common', points: 10, emoji: '🕯️' },
                { name: 'Pishachu', type: 'Ritual', rarity: 'common', points: 10, emoji: '👁️' },
                { name: 'Marutha', type: 'Forest', rarity: 'common', points: 15, emoji: '💨' },
                { name: 'Maadan', type: 'Forest', rarity: 'common', points: 15, emoji: '🌑' },
                { name: 'Parakutty', type: 'Chathan', rarity: 'uncommon', points: 25, emoji: '🌿' },
                { name: 'Neeli', type: 'Neeli', rarity: 'uncommon', points: 25, emoji: '💧' },
                { name: 'Karinkali', type: 'Ritual', rarity: 'rare', points: 50, emoji: '🖤' },
                { name: 'Gulikan', type: 'Ritual', rarity: 'rare', points: 50, emoji: '⛓️' },
                { name: 'Kutti Chathan', type: 'Chathan', rarity: 'epic', points: 100, emoji: '🔥' },
                { name: 'Chudala', type: 'Ritual', rarity: 'epic', points: 100, emoji: '🌙' },
                { name: 'Yakshi', type: 'Yakshi', rarity: 'legendary', points: 200, emoji: '🌸' },
                { name: 'Odiyan', type: 'Odiyan', rarity: 'legendary', points: 200, emoji: '🐺' },
                { name: 'Kalliyankattu Neeli', type: 'Neeli', rarity: 'legendary', points: 300, emoji: '👁️' },
                { name: 'Madan Thampuran', type: 'Forest', rarity: 'mythic', points: 500, emoji: '👑' },
                { name: 'Brahmarakshas', type: 'Ritual', rarity: 'mythic', points: 1000, emoji: '☠️' }
            ];

            const spawnWeights = {
                'common': 40, 'uncommon': 25, 'rare': 18, 'epic': 10, 'legendary': 5, 'mythic': 2
            };

            // Global State
            let score = 0;
            let currentLatLng = null;
            let activeGhostData = null;
            let activeGhostMarker = null;
            let activeFilter = 'All Spirits';
            const spawnedGhosts = []; 
            let graveyards = [];

            // Dynamic Time Logic
            const hour = new Date().getHours();
            let isNight = false;
            let maxGhosts = 2;
            let spawnIntervalMs = 90000;
            const statusBanner = document.getElementById('status-banner');

            if (hour >= 6 && hour < 18) {
                // Day
                statusBanner.innerText = "☀️ Ghosts are resting";
                statusBanner.className = "status-day liquid-glass";
            } else if (hour >= 18 && hour < 24) {
                // Evening
                isNight = true; maxGhosts = 7; spawnIntervalMs = 25000;
                statusBanner.innerText = "🌙 Haunting Window: 6:00 PM — Midnight";
                statusBanner.className = "status-evening liquid-glass";
            } else if (hour >= 0 && hour < 3) {
                // Midnight
                isNight = true; maxGhosts = 10; spawnIntervalMs = 15000;
                statusBanner.innerText = "⚠️ Paranormal activity rising after midnight";
                statusBanner.className = "status-midnight liquid-glass";
                document.getElementById('map').classList.add('midnight');
            } else {
                // Late Night (3 AM - 6 AM)
                isNight = true; maxGhosts = 8; spawnIntervalMs = 20000;
                statusBanner.innerText = "🕯️ Mythic sightings increase between 3AM–6AM";
                statusBanner.className = "status-late liquid-glass";
                document.getElementById('map').classList.add('midnight');
            }

            // DOM Elements
            const scoreDisplay = document.getElementById('score-display');
            const ghostCountDisplay = document.getElementById('ghost-count');
            const lastCaughtDisplay = document.getElementById('last-caught');
            const lastCaughtDot = document.getElementById('last-caught-dot');
            
            const bottomSheet = document.getElementById('bottom-sheet');
            const sheetEmoji = document.getElementById('sheet-emoji');
            const sheetName = document.getElementById('sheet-name');
            const sheetRarity = document.getElementById('sheet-rarity');
            const sheetPoints = document.getElementById('sheet-points');
            const catchBtn = document.getElementById('catch-btn');
            
            // Filter Logic
            const chips = document.querySelectorAll('.chip');
            chips.forEach(chip => {
                chip.addEventListener('click', (e) => {
                    chips.forEach(c => c.classList.remove('active'));
                    e.target.classList.add('active');
                    activeFilter = e.target.dataset.filter;
                    updateGhostVisibility();
                });
            });

            function updateGhostVisibility() {
                let visibleCount = 0;
                spawnedGhosts.forEach(g => {
                    const shouldShow = activeFilter === 'All Spirits' || g.data.type === activeFilter;
                    if (shouldShow) {
                        if (!map.hasLayer(g.marker)) map.addLayer(g.marker);
                        visibleCount++;
                    } else {
                        if (map.hasLayer(g.marker)) map.removeLayer(g.marker);
                    }
                });
                ghostCountDisplay.innerText = visibleCount;
            }

            // Catch Interaction
            catchBtn.addEventListener('click', () => {
                if (activeGhostData && activeGhostMarker) {
                    score += activeGhostData.points;
                    scoreDisplay.innerText = score;
                    
                    lastCaughtDisplay.innerText = activeGhostData.name;
                    lastCaughtDot.style.display = 'block';
                    lastCaughtDot.className = `rarity-dot bg-${activeGhostData.rarity}`;
                    
                    map.removeLayer(activeGhostMarker);
                    
                    const idx = spawnedGhosts.findIndex(g => g.marker === activeGhostMarker);
                    if (idx > -1) spawnedGhosts.splice(idx, 1);
                    
                    updateGhostVisibility();

                    bottomSheet.classList.remove('active');
                    activeGhostData = null;
                    activeGhostMarker = null;
                }
            });

            map.on('click', () => bottomSheet.classList.remove('active'));

            // Spawning Logic
            function getRandomGhost() {
                const rand = Math.random() * 100;
                let cumulativeWeight = 0;
                let selectedRarity = 'common';
                for (const [rarity, weight] of Object.entries(spawnWeights)) {
                    cumulativeWeight += weight;
                    if (rand <= cumulativeWeight) {
                        selectedRarity = rarity;
                        break;
                    }
                }
                const filtered = ghostsList.filter(g => g.rarity === selectedRarity);
                return filtered[Math.floor(Math.random() * filtered.length)];
            }

            function getRandomLatLngAnnulus(center, minRadius, maxRadius) {
                const R = 6378137;
                const r = Math.sqrt(Math.random() * (Math.pow(maxRadius, 2) - Math.pow(minRadius, 2)) + Math.pow(minRadius, 2));
                const theta = Math.random() * 2 * Math.PI;
                const dLat = r * Math.cos(theta);
                const dLng = r * Math.sin(theta);
                const latOffset = dLat / R * (180 / Math.PI);
                const lngOffset = dLng / (R * Math.cos(Math.PI * center.lat / 180)) * (180 / Math.PI);
                return L.latLng(center.lat + latOffset, center.lng + lngOffset);
            }

            function spawnSingleGhost(centerLatLng) {
                if (spawnedGhosts.length >= maxGhosts) return;

                const ghost = getRandomGhost();
                let location = getRandomLatLngAnnulus(centerLatLng, 200, 800);
                
                // Graveyard Biasing for Legendary/Mythic at Night
                if (isNight && (ghost.rarity === 'legendary' || ghost.rarity === 'mythic') && graveyards.length > 0) {
                    if (Math.random() > 0.5) {
                        // 50% chance to spawn exactly at a graveyard
                        const grave = graveyards[Math.floor(Math.random() * graveyards.length)];
                        location = getRandomLatLngAnnulus(L.latLng(grave.lat, grave.lon), 0, 50);
                    }
                }
                
                const daytimeClass = isNight ? '' : 'daytime';
                const ghostIcon = L.divIcon({
                    className: `ghost-marker rarity-${ghost.rarity} ${daytimeClass}`,
                    html: ghost.emoji
                });

                const marker = L.marker(location, { icon: ghostIcon });
                spawnedGhosts.push({ marker: marker, data: ghost });
                updateGhostVisibility();

                marker.on('click', (e) => {
                    L.DomEvent.stopPropagation(e);
                    activeGhostData = ghost;
                    activeGhostMarker = marker;
                    
                    sheetEmoji.innerText = ghost.emoji;
                    sheetName.innerText = ghost.name;
                    sheetRarity.innerText = `${ghost.type} SPIRIT • ${ghost.rarity}`;
                    sheetRarity.className = `color-${ghost.rarity}`;
                    sheetPoints.innerText = `+${ghost.points} PTS`;
                    
                    bottomSheet.classList.add('active');
                });
            }

            // Atmosphere Systems
            function generateDangerZones(center) {
                const zoneTypes = [
                    { color: '#2ecc71', type: 'green' }, // Safe
                    { color: '#f1c40f', type: 'yellow' }, // Moderate
                    { color: '#e74c3c', type: 'red' } // Danger
                ];
                
                const numZones = Math.floor(Math.random() * 3) + 3; // 3 to 5 zones
                for(let i=0; i<numZones; i++) {
                    const zoneDef = zoneTypes[Math.floor(Math.random() * zoneTypes.length)];
                    const loc = getRandomLatLngAnnulus(center, 300, 1500);
                    const radius = Math.random() * 400 + 200; // 200m to 600m
                    
                    L.circle(loc, {
                        color: 'transparent',
                        fillColor: zoneDef.color,
                        fillOpacity: 0.15,
                        radius: radius,
                        className: 'danger-zone-path'
                    }).addTo(map);
                }
            }

            function fetchGraveyards(lat, lon) {
                const query = `
                    [out:json];
                    nwr["landuse"="cemetery"](around:2000,${lat},${lon});
                    out center;
                `;
                fetch('https://overpass-api.de/api/interpreter', {
                    method: 'POST',
                    body: query
                })
                .then(response => response.json())
                .then(data => {
                    graveyards = data.elements.map(el => {
                        return {
                            lat: el.lat || el.center.lat,
                            lon: el.lon || el.center.lon
                        }
                    }).filter(g => g.lat && g.lon);
                    
                    const graveIcon = L.divIcon({
                        className: 'graveyard-marker',
                        html: '🪦',
                        iconSize: [36, 36],
                        iconAnchor: [18, 18]
                    });
                    
                    graveyards.forEach(g => {
                        L.marker([g.lat, g.lon], { icon: graveIcon, interactive: false }).addTo(map);
                    });
                })
                .catch(err => console.log('OSM Graveyard fetch failed silently.', err));
            }

            let mapInitialized = false;

            function initGameplay(centerLatLng) {
                if (mapInitialized) return;
                mapInitialized = true;
                
                generateDangerZones(centerLatLng);
                fetchGraveyards(centerLatLng.lat, centerLatLng.lng);

                for (let i = 0; i < maxGhosts; i++) {
                    spawnSingleGhost(centerLatLng);
                }

                setInterval(() => {
                    if (currentLatLng) spawnSingleGhost(currentLatLng);
                }, spawnIntervalMs);
            }

            // Geolocation
            function onLocationFound(e) {
                currentLatLng = e.latlng;
                if (!userMarker) {
                    userMarker = L.marker(e.latlng, { icon: pulsingIcon }).addTo(map);
                } else {
                    userMarker.setLatLng(e.latlng);
                }
                map.setView(e.latlng, 16.5);
                initGameplay(e.latlng);
            }

            function onLocationError(e) {
                console.error("Location access error:", e.message);
                // Fallback for demo purposes if location fails
                const fallback = L.latLng(8.5241, 76.9366); // Trivandrum
                map.setView(fallback, 16.5);
                initGameplay(fallback);
            }

            map.on('locationfound', onLocationFound);
            map.on('locationerror', onLocationError);
            map.locate({ setView: true, maxZoom: 16.5, watch: true, enableHighAccuracy: true });
        });
    </script>
</body>
</html>
