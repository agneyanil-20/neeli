<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HAUNT</title>
    <!-- Syne Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #ffffff;
            --glow-color: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Syne', sans-serif;
            color: #fff;
        }

        #map {
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Hide Leaflet Controls */
        .leaflet-control-zoom,
        .leaflet-control-attribution {
            display: none !important;
        }

        /* OVERLAYS & ATMOSPHERE */
        #dark-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2;
            transition: background 3s ease;
        }
        
        .night-overlay {
            background: radial-gradient(circle at center, transparent 20%, rgba(0,0,0,0.85) 100%);
        }

        #ambient-particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 3;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            bottom: -20px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            filter: blur(3px);
            animation: floatUp linear infinite;
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1) translateX(0); opacity: 0; }
            20% { opacity: 0.4; }
            80% { opacity: 0.4; }
            100% { transform: translateY(-100vh) scale(2) translateX(30px); opacity: 0; }
        }

        /* LIQUID GLASS SYSTEM */
        .liquid-glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(28px) saturate(200%);
            -webkit-backdrop-filter: blur(28px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            border-radius: 20px;
        }

        /* TOP BAR */
        #top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(56px + env(safe-area-inset-top));
            padding: env(safe-area-inset-top) 20px 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 0;
            border-left: none;
            border-right: none;
            border-top: none;
            z-index: 1000;
        }

        .top-title {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.4em;
            text-transform: uppercase;
        }

        .top-score {
            font-size: 24px;
            font-weight: 800;
            text-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        /* PARANORMAL BANNER */
        #paranormal-banner {
            position: fixed;
            top: calc(56px + env(safe-area-inset-top) + 16px);
            left: 16px;
            right: 16px;
            padding: 14px 16px;
            z-index: 1000;
            text-align: center;
            transition: all 1s ease;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .banner-title {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 0.05em;
        }

        .banner-subtitle {
            font-size: 11px;
            font-weight: 400;
            opacity: 0.8;
        }

        .banner-glow-red { 
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.1); 
            border-color: rgba(231, 76, 60, 0.4) !important; 
        }
        .banner-glow-red .banner-title { color: #ff8a80; text-shadow: 0 0 10px rgba(231, 76, 60, 0.5); }

        .banner-glow-blue { 
            box-shadow: 0 0 30px rgba(100, 100, 255, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.1); 
            border-color: rgba(100, 100, 255, 0.3) !important; 
        }
        .banner-glow-blue .banner-title { color: #b3c2ff; text-shadow: 0 0 10px rgba(100, 100, 255, 0.4); }

        .banner-glow-clear { 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); 
        }

        /* FILTER ROW */
        #filter-row {
            position: fixed;
            top: calc(56px + env(safe-area-inset-top) + 90px);
            left: 0;
            width: 100%;
            padding: 0 16px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            z-index: 1000;
        }

        #filter-row::-webkit-scrollbar {
            display: none;
        }

        .chip {
            height: 36px;
            padding: 0 20px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.6);
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .chip.active {
            background: #ffffff;
            color: #000000;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border: none;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }

        /* BOTTOM BAR */
        #bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: calc(64px + env(safe-area-inset-bottom));
            padding: 0 24px env(safe-area-inset-bottom) 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 0;
            border-left: none;
            border-right: none;
            border-bottom: none;
            z-index: 1000;
            background: rgba(5, 5, 5, 0.4);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
        }

        .bottom-stat {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .bottom-stat span {
            color: #fff;
            font-weight: 800;
        }

        .last-caught-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .rarity-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: dotBreathing 3s ease-in-out infinite alternate;
        }

        @keyframes dotBreathing {
            0% { transform: scale(0.8); opacity: 0.6; }
            100% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 10px currentColor; }
        }

        /* BOTTOM SHEET */
        #bottom-sheet {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.75);
            backdrop-filter: blur(50px) saturate(200%);
            -webkit-backdrop-filter: blur(50px) saturate(200%);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px 32px 0 0;
            padding: 36px 24px calc(36px + env(safe-area-inset-bottom));
            z-index: 2000;
            transition: bottom 0.5s cubic-bezier(0.2, 0.9, 0.3, 1.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 -15px 50px rgba(0,0,0,0.8);
        }

        #bottom-sheet.active {
            bottom: 0;
        }

        #sheet-emoji {
            font-size: 64px;
            margin-bottom: 12px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        #sheet-name {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: 0.02em;
        }

        #sheet-type {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-weight: 800;
            margin-bottom: 16px;
            opacity: 0.8;
        }

        #sheet-points {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 800;
            margin-bottom: 32px;
        }

        #catch-btn {
            width: 100%;
            height: 56px;
            background-color: #fff;
            color: #000;
            border: none;
            border-radius: 18px;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 16px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        #catch-btn:active {
            transform: scale(0.96);
            box-shadow: 0 0 30px rgba(255,255,255,0.5);
        }

        /* GHOST MARKERS & GRAVEYARDS */
        .ghost-marker {
            width: 52px;
            height: 52px;
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            animation: floatSmooth 3.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            border: 1.5px solid var(--entity-color, #ffffff22);
            box-shadow: 0 8px 16px rgba(0,0,0,0.6), 0 0 12px var(--entity-color-soft, transparent);
            z-index: 700 !important;
        }

        .ghost-marker.daytime {
            opacity: 0.5;
            filter: grayscale(0.3) saturate(0.8);
        }

        @keyframes floatSmooth {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .graveyard-marker {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            filter: drop-shadow(0 0 15px rgba(155, 89, 182, 0.6));
            animation: floatSmooth 4s ease-in-out infinite;
        }

        /* DANGER ZONES SVG ANIMATION */
        @keyframes pulse-zone {
            0% { fill-opacity: 0.05; transform: scale(0.98); transform-origin: center; }
            100% { fill-opacity: 0.15; transform: scale(1.02); transform-origin: center; }
        }
        .atmospheric-zone {
            animation: pulse-zone 4s ease-in-out infinite alternate;
            pointer-events: none;
        }

        /* ENTITY SIZE & GLOW VARIANTS */
        .marker-large {
            width: 62px;
            height: 62px;
            font-size: 32px;
            border-width: 2px;
        }

        .marker-mythic {
            animation: floatSmooth 3.5s cubic-bezier(0.4, 0, 0.2, 1) infinite, entityPulse 2.5s infinite alternate;
        }

        @keyframes entityPulse {
            0% { box-shadow: 0 0 10px var(--entity-color-soft); }
            100% { box-shadow: 0 0 30px var(--entity-color), inset 0 0 15px var(--entity-color-soft); }
        }

        /* UI ACCENTS */
        .entity-accent-text { color: var(--entity-color); text-shadow: 0 0 10px var(--entity-color-soft); }
        .entity-accent-bg { background-color: var(--entity-color); }
        .entity-accent-border { border-color: var(--entity-color); }

        /* FILTER CHIP DOT */
        .chip-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 8px;
            background: var(--dot-color, #fff);
        }


        /* USER LOCATION */
        .user-location-marker {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .dot-core {
            width: 14px;
            height: 14px;
            background: var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--glow-color);
            z-index: 2;
        }
        .dot-pulse {
            position: absolute;
            width: 14px;
            height: 14px;
            background: var(--accent-color);
            border-radius: 50%;
            animation: pulse 2.5s ease-out infinite;
            z-index: 1;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="dark-overlay"></div>
    <div id="ambient-particles"></div>

    <div id="top-bar" class="liquid-glass">
        <div class="top-title">HAUNT</div>
        <div class="top-score" id="score-display">0</div>
    </div>

    <div id="paranormal-banner" class="liquid-glass">
        <div class="banner-title" id="banner-title">Loading...</div>
        <div class="banner-subtitle" id="banner-subtitle">Detecting atmospheric activity...</div>
    </div>

    <div id="filter-row">
        <!-- Chips generated dynamically in JS -->
    </div>

    <div id="bottom-bar" class="liquid-glass">
        <div class="bottom-stat"><span id="ghost-count">0</span> entities near</div>
        <div class="bottom-stat last-caught-container">
            Last: <span id="last-caught">-</span>
            <div id="last-caught-dot" class="rarity-dot" style="display: none;"></div>
        </div>
    </div>

    <div id="bottom-sheet">
        <div id="sheet-emoji"></div>
        <div id="sheet-name"></div>
        <div id="sheet-type"></div>
        <div id="sheet-points"></div>
        <button id="catch-btn">CATCH</button>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Official Entity Color Palette
            const ENTITY_COLORS = {
                'Yakshi': '#B84A62',
                'Odiyan': '#A96A32',
                'Neeli': '#4A78B8',
                'Chathan': '#5C5C66',
                'Ritual': '#5A4678',
                'Gulikan': '#5C5C66',
                'Karinkali': '#4B3A5A',
                'Kutti Chathan': '#8A2E24',
                'Chudala': '#4B4F7A',
                'Brahmarakshas': '#701C1C',
                'Madan Thampuran': '#8C6B2E',
                'Mohini Pey': '#9B596E',
                'Sudalai Madan': '#8B4B2E',
                'Panjurli': '#5B5A3B',
                'Kallurti': '#5A4678',
                'Pretham': '#7A7A7A',
                'Pishachu': '#6B6B6B',
                'Marutha': '#5B5A3B',
                'Maadan': '#4A4A4A',
                'Parakutty': '#5A4678',
                'Kalliyankattu Neeli': '#4A78B8',
                'Spirit': '#7A7A7A',
                'Forest': '#5B5A3B'
            };

            const getEntityColor = (name, type) => ENTITY_COLORS[name] || ENTITY_COLORS[type] || '#FFFFFF';

            // Ghost Data mapping types
            const ghostsList = [
                { name: 'Pretham', rarity: 'common', type: 'Spirit', points: 10, emoji: '🕯️' },
                { name: 'Pishachu', rarity: 'common', type: 'Spirit', points: 10, emoji: '👁️' },
                { name: 'Marutha', rarity: 'common', type: 'Forest', points: 15, emoji: '💨' },
                { name: 'Maadan', rarity: 'common', type: 'Forest', points: 15, emoji: '🌑' },
                { name: 'Parakutty', rarity: 'uncommon', type: 'Ritual', points: 25, emoji: '🌿' },
                { name: 'Neeli', rarity: 'uncommon', type: 'Neeli', points: 25, emoji: '💧' },
                { name: 'Karinkali', rarity: 'rare', type: 'Ritual', points: 50, emoji: '🖤' },
                { name: 'Gulikan', rarity: 'rare', type: 'Ritual', points: 50, emoji: '⛓️' },
                { name: 'Kutti Chathan', rarity: 'epic', type: 'Chathan', points: 100, emoji: '🔥' },
                { name: 'Chudala', rarity: 'epic', type: 'Ritual', points: 100, emoji: '🌙' },
                { name: 'Yakshi', rarity: 'legendary', type: 'Yakshi', points: 200, emoji: '🌸' },
                { name: 'Odiyan', rarity: 'legendary', type: 'Odiyan', points: 200, emoji: '🐺' },
                { name: 'Kalliyankattu Neeli', rarity: 'legendary', type: 'Neeli', points: 300, emoji: '👁️' },
                { name: 'Madan Thampuran', rarity: 'mythic', type: 'Spirit', points: 500, emoji: '👑' },
                { name: 'Brahmarakshas', rarity: 'mythic', type: 'Spirit', points: 1000, emoji: '☠️' },
                { name: 'Mohini Pey', rarity: 'rare', type: 'Spirit', points: 150, emoji: '💃' },
                { name: 'Sudalai Madan', rarity: 'epic', type: 'Forest', points: 250, emoji: '🔱' },
                { name: 'Panjurli', rarity: 'legendary', type: 'Forest', points: 400, emoji: '🐗' },
                { name: 'Kallurti', rarity: 'rare', type: 'Ritual', points: 120, emoji: '🗿' }
            ];


            // Global State
            let score = 0;
            let currentLatLng = null;
            let activeGhostData = null;
            let activeGhostMarker = null;
            let activeFilter = 'All Spirits';
            const spawnedGhosts = []; 
            const dangerZones = [];
            const graveyardLocations = [];

            // Setup Map
            const map = L.map('map', {
                zoomControl: false,
                attributionControl: false
            }).setView([0, 0], 17);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 20
            }).addTo(map);

            let userMarker;
            const pulsingIcon = L.divIcon({
                className: 'user-location-marker',
                html: '<div class="dot-pulse"></div><div class="dot-core"></div>',
                iconSize: [24, 24],
                iconAnchor: [12, 12]
            });

            // Particle System
            function initParticles() {
                const container = document.getElementById('ambient-particles');
                for(let i=0; i<30; i++) {
                    let p = document.createElement('div');
                    p.className = 'particle';
                    p.style.left = Math.random() * 100 + 'vw';
                    p.style.width = Math.random() * 4 + 2 + 'px';
                    p.style.height = p.style.width;
                    p.style.animationDuration = (Math.random() * 15 + 10) + 's';
                    p.style.animationDelay = (Math.random() * 10) + 's';
                    container.appendChild(p);
                }
            }
            initParticles();

            // Filter Chip Generation
            const filterContainer = document.getElementById('filter-row');
            const categories = ['All Spirits', 'Neeli', 'Yakshi', 'Odiyan', 'Chathan', 'Ritual', 'Forest'];
            
            categories.forEach(cat => {
                const chip = document.createElement('div');
                chip.className = 'chip liquid-glass' + (cat === activeFilter ? ' active' : '');
                chip.dataset.filter = cat;
                
                if (cat !== 'All Spirits') {
                    const dot = document.createElement('div');
                    dot.className = 'chip-dot';
                    dot.style.background = ENTITY_COLORS[cat] || '#FFF';
                    chip.appendChild(dot);
                }
                
                const label = document.createTextNode(cat);
                chip.appendChild(label);
                
                chip.addEventListener('click', (e) => {
                    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    activeFilter = cat;
                    updateGhostVisibility();
                });
                
                filterContainer.appendChild(chip);
            });

            // Atmosphere Logic
            const hour = new Date().getHours();
            const isDay = hour >= 6 && hour < 18;
            const isNight = !isDay;
            const maxGhosts = isNight ? 7 : 2;
            const spawnIntervalMs = isNight ? 25000 : 90000;

            function updateAtmosphere() {
                const banner = document.getElementById('paranormal-banner');
                const title = document.getElementById('banner-title');
                const subtitle = document.getElementById('banner-subtitle');
                const overlay = document.getElementById('dark-overlay');

                if (hour >= 23 || hour < 3) {
                    banner.className = "liquid-glass banner-glow-red";
                    title.innerText = "🌙 Haunting Window: 11PM — 3AM";
                    subtitle.innerText = "⚠ Paranormal activity and mythic sightings peaking";
                    overlay.classList.add('night-overlay');
                } else if (hour >= 18 && hour < 23) {
                    banner.className = "liquid-glass banner-glow-blue";
                    title.innerText = "🌑 Nightfall Approaches";
                    subtitle.innerText = "Spirits are waking. Proceed with caution.";
                } else if (hour >= 3 && hour < 6) {
                    banner.className = "liquid-glass banner-glow-blue";
                    title.innerText = "🌫️ The Witching Hour Ends";
                    subtitle.innerText = "Activity is subsiding before dawn.";
                    overlay.classList.add('night-overlay');
                } else {
                    banner.className = "liquid-glass banner-glow-clear";
                    title.innerText = "☀️ Daylight Hours";
                    subtitle.innerText = "Return at night. Ghosts are currently resting.";
                }
            }
            updateAtmosphere();

            // DOM Elements
            const scoreDisplay = document.getElementById('score-display');
            const ghostCountDisplay = document.getElementById('ghost-count');
            const lastCaughtDisplay = document.getElementById('last-caught');
            const lastCaughtDot = document.getElementById('last-caught-dot');
            
            const bottomSheet = document.getElementById('bottom-sheet');
            const sheetEmoji = document.getElementById('sheet-emoji');
            const sheetName = document.getElementById('sheet-name');
            const sheetType = document.getElementById('sheet-type');
            const sheetPoints = document.getElementById('sheet-points');
            const catchBtn = document.getElementById('catch-btn');
            
            function updateGhostVisibility() {
                let visibleCount = 0;
                spawnedGhosts.forEach(g => {
                    const shouldShow = activeFilter === 'All Spirits' || g.data.type === activeFilter;
                    if (shouldShow) {
                        if (!map.hasLayer(g.marker)) {
                            map.addLayer(g.marker);
                        }
                        visibleCount++;
                    } else {
                        if (map.hasLayer(g.marker)) {
                            map.removeLayer(g.marker);
                        }
                    }
                });
                ghostCountDisplay.innerText = visibleCount;
            }

            // Catch Interaction
            catchBtn.addEventListener('click', () => {
                if (activeGhostData && activeGhostMarker) {
                    score += activeGhostData.points;
                    scoreDisplay.innerText = score;
                    
                    const entityColor = getEntityColor(activeGhostData.name, activeGhostData.type);
                    
                    lastCaughtDisplay.innerText = activeGhostData.name;
                    lastCaughtDot.style.display = 'block';
                    lastCaughtDot.style.background = entityColor;
                    lastCaughtDot.style.boxShadow = `0 0 10px ${entityColor}`;
                    
                    map.removeLayer(activeGhostMarker);
                    
                    const idx = spawnedGhosts.findIndex(g => g.marker === activeGhostMarker);
                    if (idx > -1) spawnedGhosts.splice(idx, 1);
                    
                    updateGhostVisibility();
                    bottomSheet.classList.remove('active');
                    activeGhostData = null;
                    activeGhostMarker = null;
                }
            });

            map.on('click', () => {
                bottomSheet.classList.remove('active');
            });

            // Map Geography Generators
            function getRandomLatLngAnnulus(center, minRadius, maxRadius) {
                const R = 6378137;
                const r = Math.sqrt(Math.random() * (Math.pow(maxRadius, 2) - Math.pow(minRadius, 2)) + Math.pow(minRadius, 2));
                const theta = Math.random() * 2 * Math.PI;
                const dLat = r * Math.cos(theta);
                const dLng = r * Math.sin(theta);
                const latOffset = dLat / R * (180 / Math.PI);
                const lngOffset = dLng / (R * Math.cos(Math.PI * center.lat / 180)) * (180 / Math.PI);
                return L.latLng(center.lat + latOffset, center.lng + lngOffset);
            }

            function generateDangerZones(center) {
                const configs = [
                    { type: 'danger', color: '#ff0000' },
                    { type: 'warning', color: '#ffa500' },
                    { type: 'warning', color: '#ffa500' },
                    { type: 'safe', color: '#4ade80' }
                ];
                
                configs.forEach(cfg => {
                    const loc = getRandomLatLngAnnulus(center, 200, 1500);
                    const radius = Math.random() * 200 + 150;
                    const circle = L.circle(loc, {
                        radius: radius,
                        color: 'transparent',
                        fillColor: cfg.color,
                        fillOpacity: 0.1,
                        className: 'atmospheric-zone'
                    }).addTo(map);
                    
                    dangerZones.push({ loc, radius, type: cfg.type });
                });
            }

            async function generateGraveyards(center) {
                try {
                    const query = `[out:json];(node["amenity"="grave_yard"](around:2000,${center.lat},${center.lng});node["landuse"="cemetery"](around:2000,${center.lat},${center.lng}););out center;`;
                    const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
                    const data = await res.json();
                    
                    if (data && data.elements && data.elements.length > 0) {
                        data.elements.slice(0, 4).forEach(el => {
                            const lat = el.lat || el.center?.lat;
                            const lon = el.lon || el.center?.lon;
                            if (lat && lon) plotGraveyard(L.latLng(lat, lon));
                        });
                        return;
                    }
                } catch(e) {
                    console.warn("Overpass API failed, generating fallback graveyards.");
                }
                
                for(let i=0; i<2; i++) {
                    plotGraveyard(getRandomLatLngAnnulus(center, 400, 1200));
                }
            }

            function plotGraveyard(latlng) {
                graveyardLocations.push(latlng);
                const icon = L.divIcon({
                    className: 'graveyard-marker',
                    html: '🪦',
                    iconSize: [36, 36],
                    iconAnchor: [18, 18]
                });
                L.marker(latlng, { icon }).addTo(map);
            }

            // Enhanced Spawning Logic
            function getSpawnRarity(spawnLoc) {
                let w = { 'common': 40, 'uncommon': 25, 'rare': 18, 'epic': 10, 'legendary': 5, 'mythic': 2 };
                
                dangerZones.forEach(z => {
                    if (spawnLoc.distanceTo(z.loc) <= z.radius) {
                        if (z.type === 'danger') { w.legendary += 15; w.mythic += 5; }
                        else if (z.type === 'safe') { w.rare -= 5; w.epic -= 5; w.common += 10; }
                    }
                });

                graveyardLocations.forEach(g => {
                    if (spawnLoc.distanceTo(g) <= 150 && isNight) {
                        w.epic += 10; w.legendary += 20; w.mythic += 10;
                    }
                });

                if (hour >= 23 || hour < 3) {
                    w.mythic += 5; w.legendary += 5;
                }

                const rand = Math.random() * Object.values(w).reduce((a,b)=>a+b, 0);
                let cumulative = 0;
                for (const [rarity, weight] of Object.entries(w)) {
                    cumulative += weight;
                    if (rand <= cumulative) return rarity;
                }
                return 'common';
            }

            function spawnSingleGhost(centerLatLng) {
                if (spawnedGhosts.length >= maxGhosts) return;

                const location = getRandomLatLngAnnulus(centerLatLng, 150, 800);
                const rarity = getSpawnRarity(location);
                const filtered = ghostsList.filter(g => g.rarity === rarity);
                const ghost = filtered[Math.floor(Math.random() * filtered.length)];
                
                const entityColor = getEntityColor(ghost.name, ghost.type);
                const daytimeClass = isNight ? '' : 'daytime';
                
                let markerClass = `ghost-marker ${daytimeClass}`;
                let size = 52;
                if (ghost.rarity === 'legendary') { markerClass += ' marker-large'; size = 62; }
                if (ghost.rarity === 'mythic') { markerClass += ' marker-large marker-mythic'; size = 62; }

                const ghostIcon = L.divIcon({
                    className: markerClass,
                    html: ghost.emoji,
                    iconSize: [size, size],
                    iconAnchor: [size/2, size/2]
                });

                const marker = L.marker(location, { icon: ghostIcon });
                
                marker.on('add', () => {
                    const el = marker.getElement();
                    if (el) {
                        el.style.setProperty('--entity-color', entityColor);
                        el.style.setProperty('--entity-color-soft', entityColor + '55');
                    }
                });

                spawnedGhosts.push({ marker: marker, data: ghost });
                updateGhostVisibility();

                marker.on('click', (e) => {
                    L.DomEvent.stopPropagation(e);
                    activeGhostData = ghost;
                    activeGhostMarker = marker;
                    
                    const color = getEntityColor(ghost.name, ghost.type);
                    
                    sheetEmoji.innerText = ghost.emoji;
                    sheetName.innerText = ghost.name;
                    sheetName.style.color = color;
                    
                    sheetType.innerText = `[ ${ghost.type} ]  ·  ${ghost.rarity}`;
                    sheetType.style.color = color;
                    
                    sheetPoints.innerText = `+${ghost.points} PTS`;
                    
                    catchBtn.style.background = color;
                    catchBtn.style.color = '#FFF';
                    catchBtn.style.boxShadow = `0 10px 20px ${color}33`;
                    
                    bottomSheet.classList.add('active');
                });
            }

            let mapInitialized = false;

            function onLocationFound(e) {
                currentLatLng = e.latlng;
                
                if (!userMarker) {
                    userMarker = L.marker(e.latlng, { icon: pulsingIcon }).addTo(map);
                } else {
                    userMarker.setLatLng(e.latlng);
                }
                
                map.setView(e.latlng, 16);

                if (!mapInitialized) {
                    mapInitialized = true;
                    generateDangerZones(e.latlng);
                    generateGraveyards(e.latlng).then(() => {
                        for (let i = 0; i < maxGhosts; i++) {
                            spawnSingleGhost(e.latlng);
                        }
                        setInterval(() => {
                            if (currentLatLng) spawnSingleGhost(currentLatLng);
                        }, spawnIntervalMs);
                    });
                }
            }

            function onLocationError(e) {
                console.error("Location access error:", e.message);
            }

            map.on('locationfound', onLocationFound);
            map.on('locationerror', onLocationError);
            map.locate({ setView: true, maxZoom: 16, watch: true, enableHighAccuracy: true });
        });
    </script>
</body>
</html>
