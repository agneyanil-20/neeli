<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>YAKSHI</title>
    <!-- Syne Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #ffffff;
            --glow-color: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Syne', sans-serif;
            color: #fff;
        }

        #map {
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Hide Leaflet Controls */
        .leaflet-control-zoom,
        .leaflet-control-attribution {
            display: none !important;
        }

        /* OVERLAYS & ATMOSPHERE */
        #dark-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2;
            transition: background 3s ease;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.4) 100%);
        }
        
        .night-overlay {
            background: radial-gradient(circle at center, transparent 10%, rgba(0,0,0,0.7) 100%) !important;
        }

        #ambient-particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 3;
            opacity: 0.4;
        }
        
        .particle {
            position: absolute;
            bottom: -20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            filter: blur(2px);
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.3; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }

        /* LIQUID GLASS SYSTEM */
        .liquid-glass {
            background: rgba(10, 10, 10, 0.4);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            border-radius: 12px;
        }

        /* TOP BAR */
        #top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(44px + env(safe-area-inset-top));
            padding: env(safe-area-inset-top) 16px 0 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 0;
            border: none;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
        }

        .top-title {
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5em;
            text-transform: uppercase;
        }

        .top-score {
            font-size: 18px;
            font-weight: 800;
            color: #fff;
        }

        /* PARANORMAL BANNER */
        #paranormal-banner {
            position: fixed;
            top: calc(44px + env(safe-area-inset-top) + 12px);
            left: 12px;
            right: 12px;
            padding: 10px 14px;
            z-index: 1000;
            text-align: left;
            transition: all 0.8s ease;
            display: flex;
            flex-direction: column;
            gap: 2px;
            border-radius: 8px;
        }

        .banner-title {
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .banner-subtitle {
            font-size: 9px;
            font-weight: 400;
            opacity: 0.6;
            letter-spacing: 0.02em;
        }

        .banner-glow-red { 
            border-left: 3px solid #ff4b2b !important;
            background: rgba(40, 5, 5, 0.4) !important;
        }
        .banner-glow-red .banner-title { color: #ff8a80; }

        .banner-glow-blue { 
            border-left: 3px solid #00d2ff !important;
        }

        .banner-glow-clear { 
            border-left: 3px solid rgba(255,255,255,0.2) !important;
        }

        /* FILTER ROW */
        #filter-row {
            position: fixed;
            top: calc(44px + env(safe-area-inset-top) + 68px);
            left: 0;
            width: 100%;
            padding: 0 12px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            z-index: 1000;
        }

        .chip {
            height: 28px;
            padding: 0 12px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.5);
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .chip.active {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: inset 0 0 10px rgba(255,255,255,0.05);
        }

        /* BOTTOM BAR */
        #bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: calc(48px + env(safe-area-inset-bottom));
            padding: 0 20px env(safe-area-inset-bottom) 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 0;
            border: none;
            z-index: 1000;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .bottom-stat {
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .bottom-stat span {
            color: rgba(255, 255, 255, 0.8);
            font-weight: 800;
        }

        .rarity-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: dotBreathing 2s infinite alternate;
        }

        @keyframes dotBreathing {
            0% { opacity: 0.4; }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* BOTTOM SHEET */
        #bottom-sheet {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px 24px 0 0;
            padding: 32px 24px calc(24px + env(safe-area-inset-bottom));
            z-index: 2000;
            transition: bottom 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        #sheet-emoji {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.9;
        }

        #sheet-name {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        #sheet-type {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 700;
            margin-bottom: 24px;
        }

        #catch-btn {
            width: 100%;
            height: 48px;
            border-radius: 12px;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
        }

        /* GHOST MARKERS & GRAVEYARDS */
        .ghost-marker {
            width: 14px !important;
            height: 14px !important;
            background: var(--entity-color, #fff);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--entity-color-soft, transparent);
            animation: radarPulse 2s infinite ease-out;
            border: 2px solid rgba(255,255,255,0.3);
            z-index: 700 !important;
        }

        @keyframes radarPulse {
            0% { transform: scale(0.8); opacity: 0.8; box-shadow: 0 0 0 0 var(--entity-color-soft); }
            100% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 0 10px transparent; }
        }

        .ghost-marker.daytime {
            opacity: 0.3;
            filter: grayscale(1);
        }

        .graveyard-marker {
            font-size: 20px;
            opacity: 0.6;
            filter: grayscale(1) contrast(1.2);
        }

        /* DANGER ZONES & LABELS */
        .atmospheric-zone {
            fill-opacity: 0.06 !important;
            pointer-events: none;
            stroke: rgba(255,0,0,0.1);
            stroke-width: 1;
        }

        .zone-label-container {
            pointer-events: none;
        }
        .zone-label {
            background: transparent;
            color: rgba(255, 75, 43, 0.6);
            font-size: 8px;
            font-weight: 800;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            white-space: nowrap;
            text-align: center;
            font-family: 'Syne', sans-serif;
            text-shadow: 0 0 5px rgba(0,0,0,0.8);
        }

        /* CHIP DOT */
        .chip-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            margin-right: 6px;
        }



        /* USER LOCATION */
        .user-location-marker {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .dot-core {
            width: 14px;
            height: 14px;
            background: var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--glow-color);
            z-index: 2;
        }
        .dot-pulse {
            position: absolute;
            width: 14px;
            height: 14px;
            background: var(--accent-color);
            border-radius: 50%;
            animation: pulse 2.5s ease-out infinite;
            z-index: 1;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(5); opacity: 0; }
        }

        /* LOADING SCREEN */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #0a0a0a 0%, #050505 100%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), visibility 1.2s;
            overflow: hidden;
        }

        #loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loading-logo {
            font-size: clamp(32px, 8vw, 48px);
            font-weight: 800;
            letter-spacing: 0.8em;
            margin-bottom: 24px;
            color: #fff;
            text-shadow: 0 0 30px rgba(255,255,255,0.2);
            opacity: 0;
            transform: translateY(20px);
            animation: logoReveal 2.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            padding-left: 0.8em;
            text-align: center;
        }

        @keyframes logoReveal {
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-status {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeInSimple 1.5s 1s forwards;
            text-align: center;
        }

        .loading-sub {
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.4);
            opacity: 0;
            animation: fadeInSimple 1.5s 1.5s forwards;
            text-align: center;
        }

        @keyframes fadeInSimple {
            to { opacity: 1; }
        }

        .waveform-container {
            width: 160px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 40px;
            opacity: 0;
            animation: fadeInSimple 1s 2s forwards;
        }

        .waveform-bar {
            width: 2px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            animation: wavePulse 1.5s ease-in-out infinite;
        }

        @keyframes wavePulse {
            0%, 100% { height: 4px; opacity: 0.3; }
            50% { height: 16px; opacity: 1; }
        }

        .loading-fog {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.03) 0%, transparent 70%);
            pointer-events: none;
            animation: fogPulse 8s ease-in-out infinite alternate;
        }

        @keyframes fogPulse {
            0% { transform: scale(1); opacity: 0.4; }
            100% { transform: scale(1.2); opacity: 0.6; }
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loading-fog"></div>
        <div class="loading-logo">YAKSHI</div>
        <div class="loading-status">Initializing Paranormal Signal Network</div>
        <div class="loading-sub">Scanning regional folklore activity…</div>
        <div class="waveform-container">
            <div class="waveform-bar" style="animation-delay: 0.0s"></div>
            <div class="waveform-bar" style="animation-delay: 0.1s"></div>
            <div class="waveform-bar" style="animation-delay: 0.2s"></div>
            <div class="waveform-bar" style="animation-delay: 0.3s"></div>
            <div class="waveform-bar" style="animation-delay: 0.4s"></div>
            <div class="waveform-bar" style="animation-delay: 0.5s"></div>
            <div class="waveform-bar" style="animation-delay: 0.6s"></div>
            <div class="waveform-bar" style="animation-delay: 0.7s"></div>
        </div>
    </div>

    <div id="map"></div>
    <div id="dark-overlay"></div>
    <div id="ambient-particles"></div>

    <div id="top-bar" class="liquid-glass">
        <div class="top-title">YAKSHI</div>
        <div class="top-score" id="score-display">0</div>
    </div>

    <div id="paranormal-banner" class="liquid-glass">
        <div class="banner-title" id="banner-title">Loading...</div>
        <div class="banner-subtitle" id="banner-subtitle">Detecting atmospheric activity...</div>
    </div>

    <div id="filter-row">
        <!-- Chips generated dynamically in JS -->
    </div>

    <div id="bottom-bar" class="liquid-glass">
        <div class="bottom-stat"><span id="ghost-count">0</span> entities near</div>
        <div class="bottom-stat last-caught-container">
            Last: <span id="last-caught">-</span>
            <div id="last-caught-dot" class="rarity-dot" style="display: none;"></div>
        </div>
    </div>

    <div id="bottom-sheet">
        <div id="sheet-emoji"></div>
        <div id="sheet-name"></div>
        <div id="sheet-type"></div>
        <div id="sheet-points"></div>
        <button id="catch-btn">CATCH</button>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Loading Screen Sequence
            const loadingScreen = document.getElementById('loading-screen');
            setTimeout(() => {
                loadingScreen.classList.add('hidden');
                setTimeout(() => {
                    loadingScreen.remove();
                }, 1200); 
            }, 4000);

            // Official Entity Color Palette
            const ENTITY_COLORS = {
                'Yakshi': '#B84A62',
                'Odiyan': '#A96A32',
                'Neeli': '#4A78B8',
                'Chathan': '#5C5C66',
                'Ritual': '#5A4678',
                'Gulikan': '#5C5C66',
                'Karinkali': '#4B3A5A',
                'Kutti Chathan': '#8A2E24',
                'Chudala': '#4B4F7A',
                'Brahmarakshas': '#701C1C',
                'Madan Thampuran': '#8C6B2E',
                'Mohini Pey': '#9B596E',
                'Sudalai Madan': '#8B4B2E',
                'Panjurli': '#5B5A3B',
                'Kallurti': '#5A4678',
                'Pretham': '#7A7A7A',
                'Pishachu': '#6B6B6B',
                'Marutha': '#5B5A3B',
                'Maadan': '#4A4A4A',
                'Parakutty': '#5A4678',
                'Spirit': '#7A7A7A',
                'Forest': '#5B5A3B',
                'Bhoota': '#8E44AD',
                'Naale Baa': '#E67E22',
                'Pilichandi': '#D35400',
                'Kumaradeva': '#2980B9',
                'Coastal Spirit': '#1ABC9C'
            };

            const REGIONAL_FOLKLORE = {
                'Kerala': {
                    regionName: 'KERALA FOLKLORE REGION',
                    entities: [
                        { name: 'Yakshi', rarity: 'legendary', type: 'Yakshi', points: 200, emoji: '🌸' },
                        { name: 'Odiyan', rarity: 'legendary', type: 'Odiyan', points: 200, emoji: '🐺' },
                        { name: 'Neeli', rarity: 'uncommon', type: 'Neeli', points: 25, emoji: '💧' },
                        { name: 'Gulikan', rarity: 'rare', type: 'Ritual', points: 50, emoji: '⛓️' },
                        { name: 'Karinkali', rarity: 'rare', type: 'Ritual', points: 50, emoji: '🖤' },
                        { name: 'Kutti Chathan', rarity: 'epic', type: 'Chathan', points: 100, emoji: '🔥' },
                        { name: 'Chudala', rarity: 'epic', type: 'Ritual', points: 100, emoji: '🌙' },
                        { name: 'Brahmarakshas', rarity: 'mythic', type: 'Spirit', points: 1000, emoji: '☠️' }
                    ],
                    categories: ['All Spirits', 'Neeli', 'Yakshi', 'Odiyan', 'Chathan', 'Ritual', 'Spirit']
                },
                'Karnataka': {
                    regionName: 'KARNATAKA FOLKLORE REGION',
                    entities: [
                        { name: 'Bhoota', rarity: 'rare', type: 'Spirit', points: 150, emoji: '🎭' },
                        { name: 'Panjurli', rarity: 'legendary', type: 'Forest', points: 400, emoji: '🐗' },
                        { name: 'Kallurti', rarity: 'rare', type: 'Ritual', points: 120, emoji: '🗿' },
                        { name: 'Naale Baa', rarity: 'epic', type: 'Spirit', points: 250, emoji: '🚪' },
                        { name: 'Pilichandi', rarity: 'legendary', type: 'Forest', points: 450, emoji: '🐯' },
                        { name: 'Kumaradeva', rarity: 'epic', type: 'Ritual', points: 300, emoji: '🛡️' },
                        { name: 'Coastal Spirit', rarity: 'uncommon', type: 'Spirit', points: 80, emoji: '🌊' }
                    ],
                    categories: ['All Spirits', 'Spirit', 'Forest', 'Ritual']
                },
                'General': {
                    regionName: 'GLOBAL FOLKLORE NETWORK',
                    entities: [
                        { name: 'Pretham', rarity: 'common', type: 'Spirit', points: 10, emoji: '🕯️' },
                        { name: 'Pishachu', rarity: 'common', type: 'Spirit', points: 10, emoji: '👁️' },
                        { name: 'Marutha', rarity: 'common', type: 'Forest', points: 15, emoji: '💨' },
                        { name: 'Maadan', rarity: 'common', type: 'Forest', points: 15, emoji: '🌑' },
                        { name: 'Parakutty', rarity: 'uncommon', type: 'Ritual', points: 25, emoji: '🌿' }
                    ],
                    categories: ['All Spirits', 'Spirit', 'Forest', 'Ritual']
                }
            };

            const getEntityColor = (name, type) => ENTITY_COLORS[name] || ENTITY_COLORS[type] || '#FFFFFF';

            // Global State
            let currentRegion = 'General';
            let detectedState = null;
            let score = 0;
            let currentLatLng = null;
            let activeGhostData = null;
            let activeGhostMarker = null;
            let activeFilter = 'All Spirits';
            const spawnedGhosts = []; 
            const dangerZones = [];
            const graveyardLocations = [];

            // Setup Map
            const map = L.map('map', {
                zoomControl: false,
                attributionControl: false
            }).setView([0, 0], 17);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 20
            }).addTo(map);

            let userMarker;
            const pulsingIcon = L.divIcon({
                className: 'user-location-marker',
                html: '<div class="dot-pulse"></div><div class="dot-core"></div>',
                iconSize: [24, 24],
                iconAnchor: [12, 12]
            });

            // Particle System
            function initParticles() {
                const container = document.getElementById('ambient-particles');
                for(let i=0; i<12; i++) { // Reduced count
                    let p = document.createElement('div');
                    p.className = 'particle';
                    p.style.left = Math.random() * 100 + 'vw';
                    p.style.width = Math.random() * 3 + 1 + 'px';
                    p.style.height = p.style.width;
                    p.style.animationDuration = (Math.random() * 10 + 8) + 's';
                    p.style.animationDelay = (Math.random() * 5) + 's';
                    container.appendChild(p);
                }
            }
            initParticles();

            // Region Detection
            async function detectRegion(lat, lng) {
                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
                    const data = await response.json();
                    const state = data.address?.state;
                    
                    if (state && state !== detectedState) {
                        detectedState = state;
                        let newRegion = 'General';
                        if (state.includes('Kerala')) newRegion = 'Kerala';
                        else if (state.includes('Karnataka')) newRegion = 'Karnataka';
                        
                        if (newRegion !== currentRegion) {
                            currentRegion = newRegion;
                            updateRegionUI();
                            // Clear existing ghosts to swap folklore packs
                            spawnedGhosts.forEach(g => map.removeLayer(g.marker));
                            spawnedGhosts.length = 0;
                            updateGhostVisibility();
                        }
                    }
                } catch (e) {
                    console.error("Region detection failed:", e);
                }
            }

            // Filter Chip Generation
            function updateRegionUI() {
                const filterContainer = document.getElementById('filter-row');
                filterContainer.innerHTML = '';
                
                const regionData = REGIONAL_FOLKLORE[currentRegion];
                const categories = regionData.categories;
                
                if (activeFilter === 'All Spirits' || !categories.includes(activeFilter)) {
                    activeFilter = 'All Spirits';
                }

                categories.forEach(cat => {
                    const chip = document.createElement('div');
                    chip.className = 'chip liquid-glass' + (cat === activeFilter ? ' active' : '');
                    chip.dataset.filter = cat;
                    
                    if (cat !== 'All Spirits') {
                        const dot = document.createElement('div');
                        dot.className = 'chip-dot';
                        dot.style.background = ENTITY_COLORS[cat] || '#FFF';
                        chip.appendChild(dot);
                    }
                    
                    const label = document.createTextNode(cat);
                    chip.appendChild(label);
                    
                    chip.addEventListener('click', (e) => {
                        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                        chip.classList.add('active');
                        activeFilter = cat;
                        updateGhostVisibility();
                    });
                    
                    filterContainer.appendChild(chip);
                });

                updateAtmosphere(); // Refresh banner with region name
            }

            // Initialize first time
            updateRegionUI();

            // Atmosphere Logic
            const hour = new Date().getHours();
            const isDay = hour >= 6 && hour < 18;
            const isNight = !isDay;
            const maxGhosts = isNight ? 6 : 2;
            const spawnIntervalMs = isNight ? 30000 : 120000;

            function updateAtmosphere() {
                const banner = document.getElementById('paranormal-banner');
                const title = document.getElementById('banner-title');
                const subtitle = document.getElementById('banner-subtitle');
                const overlay = document.getElementById('dark-overlay');
                const regionName = REGIONAL_FOLKLORE[currentRegion].regionName;

                if (hour >= 23 || hour < 3) {
                    banner.className = "liquid-glass banner-glow-red";
                    title.innerText = "SIGNAL PEAK: " + regionName;
                    subtitle.innerText = "Regional spectral density elevated. Monitoring high-tier entities.";
                    overlay.classList.add('night-overlay');
                } else {
                    banner.className = "liquid-glass banner-glow-clear";
                    title.innerText = "ACTIVE SCAN: " + regionName;
                    subtitle.innerText = "Scanning local spectral frequencies for regional manifestations.";
                }
            }
            updateAtmosphere();

            // DOM Elements
            const scoreDisplay = document.getElementById('score-display');
            const ghostCountDisplay = document.getElementById('ghost-count');
            const lastCaughtDisplay = document.getElementById('last-caught');
            const lastCaughtDot = document.getElementById('last-caught-dot');
            
            const bottomSheet = document.getElementById('bottom-sheet');
            const sheetEmoji = document.getElementById('sheet-emoji');
            const sheetName = document.getElementById('sheet-name');
            const sheetType = document.getElementById('sheet-type');
            const sheetPoints = document.getElementById('sheet-points');
            const catchBtn = document.getElementById('catch-btn');
            
            function updateGhostVisibility() {
                let visibleCount = 0;
                spawnedGhosts.forEach(g => {
                    const shouldShow = activeFilter === 'All Spirits' || g.data.type === activeFilter;
                    if (shouldShow) {
                        if (!map.hasLayer(g.marker)) {
                            map.addLayer(g.marker);
                        }
                        visibleCount++;
                    } else {
                        if (map.hasLayer(g.marker)) {
                            map.removeLayer(g.marker);
                        }
                    }
                });
                ghostCountDisplay.innerText = visibleCount;
            }

            // Catch Interaction
            catchBtn.addEventListener('click', () => {
                if (activeGhostData && activeGhostMarker) {
                    score += activeGhostData.points;
                    scoreDisplay.innerText = score;
                    
                    const entityColor = getEntityColor(activeGhostData.name, activeGhostData.type);
                    
                    lastCaughtDisplay.innerText = activeGhostData.name;
                    lastCaughtDot.style.display = 'block';
                    lastCaughtDot.style.background = entityColor;
                    
                    map.removeLayer(activeGhostMarker);
                    
                    const idx = spawnedGhosts.findIndex(g => g.marker === activeGhostMarker);
                    if (idx > -1) spawnedGhosts.splice(idx, 1);
                    
                    updateGhostVisibility();
                    bottomSheet.classList.remove('active');
                    activeGhostData = null;
                    activeGhostMarker = null;
                }
            });

            map.on('click', () => {
                bottomSheet.classList.remove('active');
            });

            // Map Geography Generators
            function getRandomLatLngAnnulus(center, minRadius, maxRadius) {
                const R = 6378137;
                const r = Math.sqrt(Math.random() * (Math.pow(maxRadius, 2) - Math.pow(minRadius, 2)) + Math.pow(minRadius, 2));
                const theta = Math.random() * 2 * Math.PI;
                const dLat = r * Math.cos(theta);
                const dLng = r * Math.sin(theta);
                const latOffset = dLat / R * (180 / Math.PI);
                const lngOffset = dLng / (R * Math.cos(Math.PI * center.lat / 180)) * (180 / Math.PI);
                return L.latLng(center.lat + latOffset, center.lng + lngOffset);
            }

            function generateDangerZones(center) {
                const configs = [
                    { type: 'danger', label: 'HIGH PARANORMAL ACTIVITY', color: '#ff4b2b' },
                    { type: 'warning', label: 'ACTIVE HAUNTING ZONE', color: '#ffa500' }
                ];
                
                configs.forEach(cfg => {
                    const loc = getRandomLatLngAnnulus(center, 300, 1200);
                    const radius = Math.random() * 150 + 100;
                    L.circle(loc, {
                        radius: radius,
                        color: 'transparent',
                        fillColor: cfg.color,
                        fillOpacity: 0.05,
                        className: 'atmospheric-zone'
                    }).addTo(map);
                    
                    // Add thin text label
                    const labelIcon = L.divIcon({
                        className: 'zone-label-container',
                        html: `<div class="zone-label">${cfg.label}</div>`,
                        iconSize: [200, 20],
                        iconAnchor: [100, 10]
                    });
                    L.marker(loc, { icon: labelIcon, interactive: false }).addTo(map);
                    
                    dangerZones.push({ loc, radius, type: cfg.type });
                });
            }

            async function generateGraveyards(center) {
                try {
                    const query = `[out:json];(node["amenity"="grave_yard"](around:2000,${center.lat},${center.lng});node["landuse"="cemetery"](around:2000,${center.lat},${center.lng}););out center;`;
                    const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
                    const data = await res.json();
                    
                    if (data && data.elements && data.elements.length > 0) {
                        data.elements.slice(0, 3).forEach(el => {
                            const lat = el.lat || el.center?.lat;
                            const lon = el.lon || el.center?.lon;
                            if (lat && lon) plotGraveyard(L.latLng(lat, lon));
                        });
                        return;
                    }
                } catch(e) {}
                for(let i=0; i<2; i++) plotGraveyard(getRandomLatLngAnnulus(center, 500, 1000));
            }

            function plotGraveyard(latlng) {
                graveyardLocations.push(latlng);
                const icon = L.divIcon({
                    className: 'graveyard-marker',
                    html: '🪦',
                    iconSize: [20, 20],
                    iconAnchor: [10, 10]
                });
                L.marker(latlng, { icon, interactive: false }).addTo(map);
            }

            // Enhanced Spawning Logic
            function getSpawnRarity(spawnLoc) {
                let w = { 'common': 45, 'uncommon': 25, 'rare': 15, 'epic': 8, 'legendary': 5, 'mythic': 2 };
                dangerZones.forEach(z => {
                    if (spawnLoc.distanceTo(z.loc) <= z.radius) {
                        if (z.type === 'danger') { w.legendary += 10; w.mythic += 4; }
                    }
                });
                graveyardLocations.forEach(g => {
                    if (spawnLoc.distanceTo(g) <= 150 && isNight) {
                        w.epic += 10; w.legendary += 15;
                    }
                });
                if (hour >= 23 || hour < 3) { w.mythic += 3; w.legendary += 5; }
                const rand = Math.random() * Object.values(w).reduce((a,b)=>a+b, 0);
                let cumulative = 0;
                for (const [rarity, weight] of Object.entries(w)) {
                    cumulative += weight;
                    if (rand <= cumulative) return rarity;
                }
                return 'common';
            }

            function spawnSingleGhost(centerLatLng) {
                if (spawnedGhosts.length >= maxGhosts) return;

                const location = getRandomLatLngAnnulus(centerLatLng, 150, 700);
                const rarity = getSpawnRarity(location);
                
                const regionalEntities = REGIONAL_FOLKLORE[currentRegion].entities;
                const filtered = regionalEntities.filter(g => g.rarity === rarity);
                
                // Fallback to any entity if rarity match is not found in region
                const ghost = filtered.length > 0 ? 
                    filtered[Math.floor(Math.random() * filtered.length)] : 
                    regionalEntities[Math.floor(Math.random() * regionalEntities.length)];
                
                const entityColor = getEntityColor(ghost.name, ghost.type);
                const daytimeClass = isNight ? '' : 'daytime';
                
                const ghostIcon = L.divIcon({
                    className: `ghost-marker ${daytimeClass}`,
                    html: '', // Dots only
                    iconSize: [14, 14],
                    iconAnchor: [7, 7]
                });

                const marker = L.marker(location, { icon: ghostIcon });
                
                marker.on('add', () => {
                    const el = marker.getElement();
                    if (el) {
                        el.style.setProperty('--entity-color', entityColor);
                        el.style.setProperty('--entity-color-soft', entityColor + '66');
                    }
                });

                spawnedGhosts.push({ marker: marker, data: ghost });
                updateGhostVisibility();

                marker.on('click', (e) => {
                    L.DomEvent.stopPropagation(e);
                    activeGhostData = ghost;
                    activeGhostMarker = marker;
                    const color = getEntityColor(ghost.name, ghost.type);
                    sheetEmoji.innerText = ghost.emoji;
                    sheetName.innerText = ghost.name;
                    sheetName.style.color = color;
                    sheetType.innerText = `${ghost.type} SIGNAL · RECEPTIVITY: ${ghost.rarity}`;
                    sheetType.style.color = color;
                    catchBtn.style.background = color;
                    catchBtn.style.color = '#FFF';
                    bottomSheet.classList.add('active');
                });
            }


            let mapInitialized = false;

            function onLocationFound(e) {
                currentLatLng = e.latlng;
                
                if (!userMarker) {
                    userMarker = L.marker(e.latlng, { icon: pulsingIcon }).addTo(map);
                } else {
                    userMarker.setLatLng(e.latlng);
                }
                
                map.setView(e.latlng, 16);

                if (!mapInitialized) {
                    mapInitialized = true;
                    detectRegion(e.latlng.lat, e.latlng.lng);
                    generateDangerZones(e.latlng);
                    generateGraveyards(e.latlng).then(() => {
                        for (let i = 0; i < maxGhosts; i++) {
                            spawnSingleGhost(e.latlng);
                        }
                        setInterval(() => {
                            if (currentLatLng) {
                                spawnSingleGhost(currentLatLng);
                                detectRegion(currentLatLng.lat, currentLatLng.lng);
                            }
                        }, spawnIntervalMs);
                    });
                }
            }

            function onLocationError(e) {
                console.error("Location access error:", e.message);
            }

            map.on('locationfound', onLocationFound);
            map.on('locationerror', onLocationError);
            map.locate({ setView: true, maxZoom: 16, watch: true, enableHighAccuracy: true });
        });
    </script>
</body>
